name: Publicar app de Cheques (GitHub Pages)

on:
  push:
    branches: [ "claude/check-report-multiplatform-d21zvj" ]
    paths:
      - "cheques-app/**"
      - ".github/workflows/deploy-cheques.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Configurar Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Subir la carpeta cheques-app
        uses: actions/upload-pages-artifact@v3
        with:
          path: cheques-app
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
